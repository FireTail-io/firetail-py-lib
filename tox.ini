[isort]
profile = black

[tox]
envlist =
    {py311}-{min,pypi,dev}
    {py312,py313}-{min,pypi,dev}
    isort-check
    isort-check-examples
    isort-check-tests
    flake8

[gh-actions]
python =
    3.11: py311-min,py311-pypi,flake8,isort-check,isort-check-examples,isort-check-tests
    3.12: py312-min,py312-pypi,flake8,isort-check,isort-check-examples,isort-check-tests
    3.13: py313-min,py313-pypi,flake8,isort-check,isort-check-examples,isort-check-tests
[testenv]
setenv=PYTHONPATH = {toxinidir}:{toxinidir}
deps=pytest
     -r{toxworkdir}/../requirements.txt
commands=
    python -m pytest tests/

[testenv:flake8]
deps=
    flake8>=6,<8
    flake8-rst-docstrings>=0.3,<1
commands=flake8 --max-line-length=120 firetail/

[testenv:isort-check]
basepython=python3
deps=isort==5.9.1
changedir={toxinidir}/firetail
commands=isort --project firetail --check-only --diff .

[testenv:isort-check-examples]
basepython=python3
deps=isort==5.9.1
changedir={toxinidir}/examples
commands=isort --thirdparty firetail --check-only --diff .

[testenv:isort-check-tests]
basepython=python3
deps=isort==5.9.1
changedir={toxinidir}/tests
commands=isort --thirdparty firetail --check-only --diff .
